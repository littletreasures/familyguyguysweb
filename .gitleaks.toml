# Gitleaks Configuration for Family Guy Guys Website
title = "Family Guy Guys Gitleaks Config"

[allowlist]
description = "Global allowlist for documentation, example environment templates, test mocks, and placeholder strings"
paths = [
  '''\.env\.example''',
  '''admin-tools/\.env\.example''',
  '''README\.md''',
  '''SECURITY_ACTIONS_REQUIRED\.md''',
  '''PERFORMANCE_BASELINE\.md''',
  '''tests/.*''',
]
regexes = [
  '''your_[a-zA-Z0-9_]+_key''',
  '''your_supabase_[a-zA-Z0-9_]+''',
  '''your_service_role_key''',
  '''your_omdb_api_key''',
  '''your_gemini_api_key''',
  '''your_openai_api_key''',
  '''your_anthropic_api_key''',
  '''<[a-zA-Z0-9_]+>''',
]
